version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: telecom-insights-db

    environment:
      POSTGRES_DB: insight
      POSTGRES_USER: root
      POSTGRES_PASSWORD:

    ports:
      - "5433:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d insight"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: